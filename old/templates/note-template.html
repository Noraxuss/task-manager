<!-- Title -->
 <template id="note-template">
    <div class="note">  
        <div class="note-title-container">
            <textarea
                class="note-title"
                placeholder="Task title..."
            ></textarea>
        </div>

        <!-- Content -->
        <div class="note-content-container">
            <textarea
                class="note-content"
                placeholder="New task..."
            ></textarea>
        </div>

        <!-- Bottom menu -->
        <div class="note-bottom-container">

            <button class="bold-letter-btn note-function-btn"  aria-label="bold letter">
                <img src="assets/bold.svg" width="18" height="18" />
            </button>

            <button class="italic-letter-btn note-function-btn" aria-label="italic letter">
                <img src="assets/italic.svg" width="18" height="18" />
            </button>

            <button class="underline-letter-btn note-function-btn" aria-label="underline letter">
                <img src="assets/underline.svg" width="18" height="18" />
            </button>

            <button class="strikethrough-letter-btn note-function-btn" aria-label="strikethrough letter">
                <img src="assets/strikethrough.svg" width="18" height="18" />
            </button>

            <button class="move-down-btn note-function-btn" aria-label="Move down">
                <img src="assets/move-down.svg" width="18" height="18" />
            </button>

            <button class="note-move-up-btn note-function-btn" aria-label="Move up">
                <img src="assets/move-up.svg" width="18" height="18" />
            </button>

            <input type="number" class="font-size-input" aria-label="Font size" min="4" max="72" value="12" />

            <button class="enlarge-btn note-function-btn" aria-label="Enlarge note">
                <img src="assets/enlarge.svg" width="18" height="18" />
            </button>

            <button class="shrink-btn note-function-btn" aria-label="Shrink note">
                <img src="assets/shrink.svg" width="18" height="18" />
            </button>

            <button class="note-menu-btn" aria-label="Note options">
                <img src="assets/ellipsis-vertical.svg" width="18" height="18" />
            </button>

            <div class="note-menu">
                <button class="color-change-btn">

                    <img src="assets/palette.svg" width="18" height="18">
            
                        <input
                            type="color"
                            class="note-color-picker"
                            
                        />
                    </img>
                </button>

                <button class="delete-task">
                    <img src="assets/delete.svg" width="18" height="18" />
                </button>
            </div>
        </div>
        </div>
    </template>
