<main id="task-scene">
    <!-- Tasks will be dynamically inserted here -->

    <button id="addTask" class="addTask" aria-label="Add Task">
        <svg xmlns="http://www.w3.org/2000/svg" 
             width="40" height="40" viewBox="0 0 24 24" 
             class="sticky-note-icon">
            <!-- Yellow sticky note body -->
            <path fill="var(--sticky-note-yellow)" 
                  d="M21 9a2.4 2.4 0 0 0-.706-1.706l-3.588-3.588A2.4 2.4 0 0 0 15 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z"/>
            <!-- Optional details (lines/fold) -->
            <path fill="none" stroke="var(--text-main)" stroke-width="2" 
                  d="M15 3v5a1 1 0 0 0 1 1h5"/>
        </svg>
    </button>
</main>
